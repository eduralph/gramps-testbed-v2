# pdca.toml — driver configuration for Gramps Testbed v2.
# Read by pdca_harness.config; the only project-specific runtime config.

[project]
name = "Gramps Testbed v2"
default_branch = "main"
# Default §9 sign-off attribution, so `flow`/`signoff` never need a --by. Override
# per-run with --by. (Template renders this from the copier author_name answer.)
author = "Eduard Ralph"

[paths]
bundle_root = "results"
process_dir = "process"
templates_dir = "templates"

# In-driver lane concurrency (docs 09 §parallel lanes). `lanes` is the worker-pool
# size for the UNATTENDED Do+Check band only — Plan, sign-off, publish, and Act stay
# serial. 1 (the default) is the strictly-serial driver. Override for a single run
# with `PDCA_LANES=N` or `--lanes N` on `pdca flow` / `pdca batch`.
#
# A pool > 1 runs N bundles concurrently in ONE workspace. Each worker is pinned to a
# fixed lane slot 0..N-1 and exposes it to every gate command as `$PDCA_LANE`. A gate
# that backs onto a shared mutable resource (a target checkout it applies/reverts, a
# container, a port, a scratch dir) MUST name that resource by `$PDCA_LANE` so two
# lanes can't collide — e.g. `--name app-l$PDCA_LANE`, a `repo-lane$PDCA_LANE`
# checkout. Bundles in the same lane reuse that lane's resources serially, so you need
# only N copies, not one per bundle. Leave at 1 unless per-lane disk / sign-off
# ergonomics actually bite (then prefer this over N separate workspaces).
[driver]
lanes = 4

[tracker]
system = "mantis"
url = "https://gramps-project.org/bugs"
issue_id_example = "13418"
# Default tracker export the planner reads the issue row from when `flow` is run
# without --from-csv. The planner reads ONLY the row for the issue id (it does not
# scan the testbed repo for issue info). Re-export from Mantis to refresh.
export_csv = "engine/20260529 - Mantis Export.csv"
# Trailer linking a commit/PR to the issue ({id} = the bug id). Trackers differ
# (GitHub/Mantis "Fixes #{id}", Jira "Fixes PROJ-{id}"); "" enforces none. The
# publish step's commit-msg ends with this; the T4 gate (if any) checks it.
# No tracker id yet? Use `pdca publish --no-issue`: it omits the trailer, relaxes
# T4 to a flag, and records the bundle `id_pending` (no magic "#0000" placeholder).
issue_trailer = "Fixes #{id}"

# Publish mechanics — `pdca publish` and the flow's publish-on-accept (docs 03 §Check
# closing step). Branch patterns are `{id}` / `{slug}` format strings; the
# repo→checkout map falls back to the sibling convention (`<project>/../<repo-last-
# segment>`) when a repo_spec is unmapped, so most setups need no entries. Gramps
# fixes use the `fix/bug-…` branch convention (INTEGRATION §2).
[publisher]
fix_branch_pattern = "fix/bug-{id}-{slug}"
feature_branch_pattern = "enhancement/{id}-{slug}"

[publisher.checkouts]
# "<org/repo>" = "../<checkout-dir>"   # only the exceptions to the sibling default
# (the sibling default already resolves gramps-project/gramps → ../gramps, etc.)

[publisher.repo_aliases]
# Brief "Repo + branch target" shorthand → canonical OWNER/REPO. A brief may name the
# repo loosely ("gramps (core)", "addons-source"); publish takes the first token and
# maps it here so `gh --repo` / the checkout path get a real OWNER/REPO. An explicit
# OWNER/REPO in the brief passes through untouched.
gramps = "gramps-project/gramps"
addons-source = "gramps-project/addons-source"

# The six model leaves (docs 03 §Implementation substrate). mode = "stub" runs
# the offline placeholders (no model/TTY) so the driver works without a model;
# mode = "command" runs `argv` as a subprocess with the leaf's prompt. `interactive
# = true` hands the terminal to the human (a seeded `claude "<prompt>"` REPL, no
# -p); a headless leaf runs autonomously (`claude -p …`) and writes its artifact.
# Set PDCA_LEAVES_MODE=stub to force stubs everywhere (CI / `make` determinism).
#
# Headless leaves — Do builder (writes patch.diff + test + build-notes.md):
[leaves.builder]
mode = "command"
family = "claude"
interactive = false
argv = ["claude", "-p", "--agent", "builder", "--permission-mode", "acceptEdits", "--allowedTools", "Read,Edit,Bash(git *),Bash(python3 *)"]

# Check reviewer (advisory, build-notes withheld). Cross-vendor decorrelation is
# the ideal (a DIFFERENT family from the builder); `--agent reviewer` is the
# documented same-vendor fallback when codex isn't available — switch family/argv
# to codex to restore independence (INTEGRATION §4).
[leaves.reviewer]
mode = "command"
family = "claude"
interactive = false
argv = ["claude", "-p", "--agent", "reviewer", "--permission-mode", "acceptEdits", "--allowedTools", "Read,Edit"]

# Interactive leaves — the human-in-the-loop touch points (Plan, Sign-off, Publish,
# Act) hand the terminal to a seeded Claude REPL. Claude by design (a model+human
# session), independent of the builder/reviewer family above.
[leaves.planner]
mode = "command"
family = "claude"
interactive = true
# Plan is the highest-leverage beat: a brief defect propagates through Do and is only
# caught (if at all) by a human at T5. So pin the strongest model + raised effort here
# EXPLICITLY (version-controlled) rather than inheriting an un-versioned machine default
# from ~/.claude.json. `--effort xhigh` is the recommended level for agentic/coding work;
# pin it explicitly because a tier's default effort may be lower than xhigh.
# Act 2026-06-08 (issue_8653: under-specified brief) pinned a strong model + xhigh.
# Act 2026-06-10: briefly moved the planner to Fable 5, then reverted to opus-4-8 for
# planning. Mechanical leaves (builder/reviewer) intentionally stay on default.
argv = ["claude", "--model", "claude-opus-4-8", "--effort", "xhigh", "--agent", "planner", "--permission-mode", "acceptEdits"]

[leaves.signoff]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "signoff", "--permission-mode", "acceptEdits"]

# Publisher — the closing work of Check: for an ACCEPTED fix, drafts commit-msg.txt +
# pr-description.md WITH the human (doc 16). The deterministic `pdca publish` then
# branches/applies/commits/pushes and opens the DRAFT PR; this leaf writes prose only.
[leaves.publisher]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "publisher", "--permission-mode", "acceptEdits"]

[leaves.act]
mode = "command"
family = "claude"
interactive = true
argv = ["claude", "--agent", "act", "--permission-mode", "acceptEdits"]

# Deterministic Check gates (docs 04). Each check runs a shell command; it PASSES
# iff the command exits 0. `scope = "repo"` runs against the working tree (and is
# what CI re-runs via `pdca gates --working-tree`); `scope = "bundle"` needs the
# bundle/patch context ($PDCA_BUNDLE is exported) and runs only locally. The
# SAME commands run for the local driver and CI — single-sourced, no drift.
#
# The REAL gramps gate tiers (verified commands from the gramps-testbed reference
# repo, see docs/INTEGRATION.md §4). The gramps verification engine lives under
# `engine/` here (the reference repo's `agent-work/scripts/` + top-level `docker/`
# were consolidated into one namespace on integration). As soon as ONE real
# `[[gates.checks]]` row is active, `config.gates_checks` is non-empty and the
# driver stops using its built-in all-PASS stubs — so the rows below are the live
# gate set, not a fallback.
#
# LIVE: C4-verify (per-fix red→green, GATING) + T3-unit (whole-suite, advisory).
# STAGED (commented): T1/T2 static analysis and addon-unit. The same cmd runs both
# places (single-sourced via `pdca gates` / `pdca gates --working-tree`, no drift).

# Target-aware gate selection (template v0.12.0). The repo-scoped runtime gates below
# carry `target` so an addon-only bundle skips the gramps CORE suites (T3-unit,
# T3-interface) and a core-only bundle skips the ADDON matrix (T3-addon-unit-6{0,1}).
# The bundle is classified from its brief's "Repo + branch target": anything mentioning
# `addons-source` → "addon", else the default "core". `pdca gates --working-tree` (no
# bundle) is never filtered, so the CI re-gate is unaffected.
[gates]
target_default = "core"

[gates.target_match]
addon = "addons-source"

# Additive flag (template v0.13.0): a change "surfaces" in the GUI iff the brief's
# `Surfaces` field mentions "gui". A frontend-interacting change (core OR addon) gets
# the `frontend` label, so the GUI smoke (target = "frontend") and the addon-in-GUI E2E
# (target = ["addon", "frontend"]) run for it; a pure-logic change does not.
[gates.target_flags]
frontend = { field = "surfaces", substring = "gui" }

# C4 — the per-fix CORRECTNESS gate (bundle-scoped, GATING). Applies the bundle's
# patch.diff and runs ONLY its test, asserting red-without-fix / green-with-fix.
# This is what makes a bugfix cycle mean something — it actually validates THIS
# change, unlike T3-unit below.
[[gates.checks]]
id = "C4-verify"
tier = "C4"
label = "fix verified: test red pre-fix, green post-fix"
cmd = "./engine/scripts/ubuntu/run-verify.sh"
gating = true
scope = "bundle"

# T3 runtime — the WHOLE gramps core unit suite, on the UNMODIFIED tree. Advisory
# (gating = false): on a checkout with any pre-existing failure it is red as a
# baseline and never sees the bundle's patch, so it cannot gate a single fix —
# C4-verify above is the per-fix gate. Re-gate this once the suite is green-baseline.
# Wrapped in t3_baseline.py: it runs the suite, then diffs the result against the
# recorded baseline (engine/baselines/run-unit.json) — a matching baseline exits 0
# ("known reds"), only a NEW failure exits 1, so only a delta raises §6 (issue #7).
[[gates.checks]]
id = "T3-unit"
tier = "T3"
label = "runtime: gramps core unit suite (whole-suite baseline)"
cmd = "python3 ./engine/conformance/t3_baseline.py ./engine/scripts/ubuntu/run-unit.sh"
gating = false
scope = "repo"
target = "core"   # gramps core suite — skip on an addon-only bundle

# T3 runtime — the addon unit suites, as a VERSION MATRIX. Addons live on
# addons-source maintenance/gramps6{0,1}; a gramps60 fix is cherry-picked forward to
# gramps61, so each branch's addons must pass against its MATCHING core. Each row
# runs the suite in the pinned per-version worktrees (`make worktrees`) via
# CORE_VERSION, baseline-diffed against its own manifest. Advisory like T3-unit.
[[gates.checks]]
id = "T3-addon-unit-60"
tier = "T3"
label = "runtime: addon suites — addons-source gramps60 × core 6.0 (matrix)"
cmd = "CORE_VERSION=6.0 PDCA_T3_BASELINE=engine/baselines/run-addon-unit-60.json python3 ./engine/conformance/t3_baseline.py ./engine/scripts/ubuntu/run-addon-unit.sh"
gating = false
scope = "repo"
target = "addon"   # addon matrix — skip on a core-only bundle

[[gates.checks]]
id = "T3-addon-unit-61"
tier = "T3"
label = "runtime: addon suites — addons-source gramps61 × core 6.1 (matrix)"
cmd = "CORE_VERSION=6.1 PDCA_T3_BASELINE=engine/baselines/run-addon-unit-61.json python3 ./engine/conformance/t3_baseline.py ./engine/scripts/ubuntu/run-addon-unit.sh"
gating = false
scope = "repo"
target = "addon"   # addon matrix — skip on a core-only bundle

# T3 runtime — interface SMOKE baseline (GUI comes up + opens a tree, driven
# headless via Xvfb + AT-SPI + dogtail; engine/interface/test_smoke.py). Advisory
# and scoped to the smoke test only: the full interface suite is a mix of green
# tests and reproductions of UNMERGED upstream bugs (e.g. bug 14100 / gramps#2322),
# so the whole-suite run is a characterization, not a clean gate — run it manually
# with `./engine/scripts/ubuntu/run-interface.sh` (no arg). A per-fix interface-level
# C4 (bundle-scoped, the bug's own interface test red→green) is the future extension.
[[gates.checks]]
id = "T3-interface"
tier = "T3"
label = "runtime: GUI interface smoke (launch + open tree, headless dogtail)"
cmd = "python3 ./engine/conformance/t3_baseline.py ./engine/scripts/ubuntu/run-interface.sh test_smoke.py"
gating = false
scope = "repo"
target = "frontend"   # runs for any GUI-surfacing change (core OR addon); skips pure-logic

# T3 runtime — addon END-TO-END: install a frontend addon into a headless gramps GUI and
# run the addon's own tests/interface/ suite (the E2E-with-core a GUI addon needs). Runs
# ONLY for a frontend addon bundle (target subset {addon, frontend}); auto-discovers every
# addon shipping tests/interface/. Advisory + baseline-diffed like the other T3 gates; the
# addon-side test convention is in docs/INTEGRATION.md §3.
[[gates.checks]]
id = "T3-addon-interface"
tier = "T3"
label = "runtime: addon E2E (addon loaded in headless gramps GUI, dogtail)"
cmd = "python3 ./engine/conformance/t3_baseline.py ./engine/scripts/ubuntu/run-addon-interface.sh"
gating = false
scope = "repo"
target = ["addon", "frontend"]   # frontend addons only (AND); pure-logic addons + core skip

# T1/T2/T4 conformance — the structure / shape / contribution tiers, mechanised
# from wiki doc 16, the foundation of the T1–T4 ladder. Each checker cites every
# rule back to its source by SECTION (core vs addon per target; see
# engine/conformance/{doc16,t1_structure,t2_shape,t4_contribution}.py). They are
# bundle-scoped — the dispatcher derives the target from the bundle: T1/T2 audit
# the addon(s) the patch.diff touches (core-only patch = N/A), T4 the bundle's
# commit-msg.txt / pr-description.md (absent = N/A). ADVISORY (gating = false),
# like the T3 baselines: they audit the touched contribution and surface doc-16
# violations as evidence for the reviewer + human, without gating on legacy
# addon state that the contribution did not introduce. Promote to gating once
# the targeted addons are conformance-clean.
[[gates.checks]]
id = "T1-structure"
tier = "T1"
label = "structure: addon layout vs doc 16 §Structure (folder==id, target_version, fname, no __init__.py)"
cmd = "python3 ./engine/conformance/gate.py T1"
gating = false
scope = "bundle"

[[gates.checks]]
id = "T2-shape"
tier = "T2"
label = "shape: code shape vs doc 16 §Coding style (GPL header on touched files; print() advisory for reviewer)"
cmd = "python3 ./engine/conformance/gate.py T2"
gating = false
scope = "bundle"

[[gates.checks]]
id = "T4-contribution"
tier = "T4"
label = "contribution: commit/PR wrapper vs doc 16 §Commit messages + §Contributor workflow"
cmd = "python3 ./engine/conformance/gate.py T4"
gating = false
scope = "bundle"

# --- STAGED (not yet ported / wired) -----------------------------------------
# An interface-level C4 via run-interface.sh lands here once that runner is
# ported (C4-verify is LIVE above — the unit-level per-fix gate). A black/ruff
# formatter gate (doc 16 §Coding style SHOULD, doc16:106) can be added repo-
# scoped when the target repo enforces it; T2-shape covers the static MUSTs.

